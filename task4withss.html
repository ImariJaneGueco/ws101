<title>Task 4: HTML Forms</title>
<style>
/* ===== GENERAL BODY ===== */
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:50px;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#e5e7eb;
}

/* ===== HEADER ===== */
header{
  text-align:center;
  margin-bottom:50px;
}

header h1{
  font-size:36px;
  color:#60a5fa;
  margin-bottom:10px;
}

header p{
  max-width:700px;
  margin:auto;
  font-size:16px;
  line-height:1.6;
  color:#cbd5f5;
}

/* ===== COLLAPSIBLE CARDS ===== */
details{
  background: rgba(30,41,59,0.85);
  border-left:8px solid #3b82f6;
  border-radius:20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.7);
  padding:20px 30px;
  margin-bottom:30px;
  transition:0.3s;
  backdrop-filter: blur(10px);
}

details:hover{
  transform: translateY(-4px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.85);
}

/* ===== SUMMARY (header of collapsible) ===== */
summary{
  font-size:22px;
  color:#60a5fa;
  cursor:pointer;
  list-style:none;
  position: relative;
  padding-right:25px;
  user-select: none;
}

/* Arrow icon */
summary::after{
  content: '▸';
  position: absolute;
  right:0;
  font-size:20px;
  transition: transform 0.3s ease;
}

details[open] summary::after{
  transform: rotate(90deg);
}

/* ===== COLLAPSIBLE CONTENT ===== */
details img{
  display:block;
  margin:20px auto 0;
  max-width:80%;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.7);
  transition:0.3s;
}

details img:hover{
  transform: scale(1.05);
}

details ul{
  list-style:none;
  padding:0;
  text-align:center;
  margin-top:15px;
}

details li{
  margin:12px 0;
  font-size:16px;
  background: rgba(45,55,72,0.7);
  padding:10px 15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

details li ul li{
  margin-top:5px;
  margin-left:20px;
  background: rgba(60,70,90,0.6);
}

details a{
  color:white;
  background:#2563eb;
  padding:10px 20px;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

details a:hover{
  background:#1d4ed8;
  box-shadow:0 0 10px #3b82f6;
}
</style>
</head>

<header>
